server:
  port: 9099

spring:
  application:
    name: ragent-mcp-server
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    url: jdbc:postgresql://${ragent.infra.host:localhost}:5432/ragent?client_encoding=UTF8
    hikari:
      maximum-pool-size: 5
      read-only: true

logging:
  level:
    com.nageoffer.ai.ragent.mcp.support.SqlQueryLogger: INFO

weather:
  qweather:
    api-key: ${QWEATHER_API_KEY:}
    api-host: ${QWEATHER_API_HOST:}
    lang: zh
    timeout-ms: 5000
