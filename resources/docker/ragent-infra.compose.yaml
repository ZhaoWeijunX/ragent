# Ragent 本地开发中间件一键启动
#
# 包含：PostgreSQL(pgvector) / Redis / RustFS / RocketMQ(+Dashboard)
# 默认账号与 bootstrap application.yaml 对齐，应用跑在宿主机即可连 localhost。
#
# 使用方法：
#   cd resources/docker
#   docker compose -f ragent-infra.compose.yaml up -d
#   docker compose -f ragent-infra.compose.yaml ps
#   docker compose -f ragent-infra.compose.yaml down          # 停容器，保留数据卷
#   docker compose -f ragent-infra.compose.yaml down -v       # 停容器并删除数据卷（慎用）
#
# 端口：
#   PostgreSQL 5432 | Redis 6379 | RustFS 9000/9001
#   RocketMQ NameServer 9876 | Broker 10909/10911/10912 | Dashboard 8082
#
# 注意：
#   1. 若本机已有同名容器（postgres/redis/rustfs/rmq*），先停掉再建。
#   2. brokerIP1=127.0.0.1 适合「应用在宿主机」；应用也进 Compose 时需改可达地址。

name: ragent-infra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "123456"]
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.72
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command:
      - --address
      - :9000
      - --console-enable
      - --access-key
      - rustfsadmin
      - --secret-key
      - rustfsadmin
      - /data
    restart: unless-stopped

  rmqnamesrv:
    image: apache/rocketmq:5.2.0
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx400m"
    command: sh mqnamesrv
    networks:
      - rocketmq
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "grep -q 'The Name Server boot success' /home/rocketmq/logs/rocketmqlogs/namesrv.log || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  rmqbroker:
    image: apache/rocketmq:5.2.0
    container_name: rmqbroker
    ports:
      - "10912:10912"
      - "10911:10911"
      - "10909:10909"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    environment:
      NAMESRV_ADDR: "rmqnamesrv:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m -XX:-UseContainerSupport"
    depends_on:
      rmqnamesrv:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /home/rocketmq/rocketmq-5.2.0/conf/broker.conf << EOF
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1 = 127.0.0.1
        timerMaxDelaySec = 31622400
        coldDataScanEnable = false
        coldDataFlowControlEnable = false
        EOF
        sh mqbroker -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    networks:
      - rocketmq
    restart: unless-stopped

  dashboard:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: rocketmq-dashboard
    network_mode: "service:rmqbroker"
    environment:
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -XX:MaxMetaspaceSize=256m
        -Drocketmq.config.enableDashBoardCollect=false
        -Drocketmq.namesrv.addr=rmqnamesrv:9876
        -Dserver.port=8082
    depends_on:
      rmqbroker:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  rustfs-data:

networks:
  rocketmq:
    driver: bridge
