server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    # 配置 文件上传限制
    multipart:
      # 单个文件最大大小
      max-file-size: 50MB
      # 整个请求最大大小
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    #    username: root
    #    password: root
    #    url: jdbc:mysql://192.168.26.150:3306/ragent?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: postgres
    password: postgres
    url: jdbc:postgresql://192.168.26.150:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 192.168.26.150
      port: 6379
      password: 123456

rocketmq:
  name-server: 192.168.26.150:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://192.168.26.150:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true                 # 调用 llm，否则走规则拆分

  rerank:
    enabled: true

  rate-limit:
    global:
      enabled: true               # 限流开关
      max-concurrent: 10          # 最大并发数
      max-wait-seconds: 15        # 排队最大等待时间
      lease-seconds: 30           # 许可自动过期时间（兜底）
      poll-interval-ms: 200       # 轮询间隔

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10        # 最多 10 个并发上传
      max-wait-seconds: 5       # 等待许可最多 5s
      lease-seconds: 300        # 许可有效期 5min

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        enabled: true
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      #      api-key: ${BAILIAN_API_KEY:}
      api-key: sk-c3d57b3b03374716ac99d2085d7289ab
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    aihubmix:
      url: https://aihubmix.com
      api-key: ${AIHUBMIX_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    siliconflow:
      url: https://api.siliconflow.cn
      #      api-key: ${SILICONFLOW_API_KEY:}
      api-key: sk-eppyidbuxoijpysejtsxbuxwvsrxjeqywuhwwfyjpddflqjd
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
  # ======== 熔断策略 ==========
  selection:
    failure-threshold: 2          # 连续失败两次，出发熔断
    open-duration-ms: 30000       # 熔断持续 30 s

  # ======== 流式配置 ==========
  stream:
    message-chunk-size: 1         # 流式消息合并块大小

  # ======== chat 模型组 ==========
  chat:
    default-model: qwen-plus        # 默认使用的模型
    deep-thinking-model: qwen3-max  # 深度思考模型
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 4
      - id: gpt-5.4
        provider: aihubmix
        model: gpt-5.4
        priority: 5

  # ======== embedding 模型组 ==========
  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2
      - id: text-embedding-3-large
        provider: aihubmix
        model: text-embedding-3-large
        dimension: ${rag.default.dimension}
        priority: 3

  # ======== rerank 模型组 ==========
  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop       # 如果模型挂了，直接不操作，使用原始顺序截断返回 topN 结果，不重排，不报错
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://192.168.26.150:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
  eval:
    enabled: true
